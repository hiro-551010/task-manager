name: E2E Tests

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "apps/api/**"
      - "packages/shared/**"

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      db-test:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: taskdb_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://postgres:password@localhost:5433/taskdb_test

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        working-directory: apps/web
        run: bunx playwright install --with-deps chromium

      - name: Run migrations on test DB
        working-directory: apps/api
        run: DATABASE_URL=$TEST_DATABASE_URL bun run migrate

      - name: Run E2E tests
        working-directory: apps/web
        run: bun run e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/

      - name: Upload error report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-error-report
          path: apps/web/e2e/error-report.json
